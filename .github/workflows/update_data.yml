name: Vatican Engine Automated

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Trigger Vatican Bot Processing
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GH_TOKEN: ${{ secrets.MY_GH_TOKEN }}
        run: python vatican_bot.py

      - name: Commit and Push fresh ligues.json
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GH_TOKEN }}
        run: |
          git config --global user.name "Vatican-Bot"
          git config --global user.email "actions@github.com"
          
          git remote set-url origin https://x-access-token:${{ secrets.MY_GH_TOKEN }}@github.com/${{ github.repository }}.git
          
          git add ligues.json
          git commit -m "Automated data update: fresh ligues.json [skip ci]" || echo "Aucun changement détecté"
          git push origin main
          

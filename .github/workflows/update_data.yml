name: Vatican Engine Automated

on:
  schedule:
    # S'exécute automatiquement toutes les nuits à 4h00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Te permet de lancer le robot manuellement depuis l'onglet Actions

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Trigger Vatican Bot Processing
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python vatican_bot.py

      - name: Commit and Push fresh ligues.json
        run: |
          git config --global user.name "Vatican-Bot"
          git config --global user.email "actions@github.com"
          
          # Vérifie si le fichier ligues.json a été modifié ou créé
          if git status --porcelain | grep -q "ligues.json"; then
            echo "Changements détectés dans ligues.json. Sauvegarde en cours..."
            git add ligues.json
            git commit -m "Automated data update: fresh ligues.json [skip ci]"
            git push
          else
            echo "Aucune nouvelle donnée ou modification détectée."
          fi
          

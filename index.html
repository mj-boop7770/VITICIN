<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VATICIN — Oracle Football</title>
<meta name="theme-color" content="#060709"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060709;color:#f3f4f6;font-family:sans-serif;min-height:100vh}
header{padding:.8rem 1rem;border-bottom:1px solid #1a1f2e;position:sticky;top:0;background:#060709;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center}
h1{font-size:1.3rem;font-weight:900;color:#f59e0b;letter-spacing:3px;font-family:monospace}
.sub{font-size:.6rem;color:#6b7280;letter-spacing:.15em;margin-top:.2rem}
select{background:#0e111a;color:#9ca3af;border:1px solid #1f2937;border-radius:6px;padding:.3rem .5rem;font-size:.7rem;outline:none}
.update{font-size:.55rem;color:#374151;margin-top:.3rem;font-family:monospace}
.tabs{display:flex;gap:.3rem;padding:.6rem 1rem;border-bottom:1px solid #1a1f2e;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:.4rem .8rem;border-radius:20px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid #1f2937;background:transparent;color:#6b7280;font-family:monospace;transition:all .2s}
.tab.active{background:#f59e0b;color:#000;border-color:#f59e0b}
.ligues-bar{display:flex;gap:.3rem;padding:.5rem 1rem;overflow-x:auto;scrollbar-width:none}
.ligues-bar::-webkit-scrollbar{display:none}
.lbtn{padding:.3rem .7rem;border-radius:12px;font-size:.65rem;cursor:pointer;white-space:nowrap;border:1px solid #1f2937;background:transparent;color:#6b7280;font-family:monospace}
.lbtn.active{border-color:#f59e0b;color:#f59e0b}
main{padding:.8rem 1rem;max-width:600px;margin:0 auto}
.card{background:#0e111a;border-radius:12px;padding:1rem;margin-bottom:.8rem;border:1px solid #1f2937}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.teams{font-weight:700;font-size:.9rem;color:#f3f4f6}
.score{font-family:monospace;font-weight:900;font-size:1.1rem;color:#f59e0b}
.time{font-size:.6rem;color:#6b7280;font-family:monospace}
.statut{font-size:.6rem;font-weight:700;padding:.2rem .5rem;border-radius:6px;font-family:monospace}
.statut.live{background:#ef444420;color:#ef4444}
.statut.scheduled{background:#3b82f620;color:#3b82f6}
.statut.finished{background:#10b98120;color:#10b981}
.statut.mercato{background:#f59e0b20;color:#f59e0b}
.oracle{margin:.6rem 0;padding:.6rem;background:#060709;border-radius:8px;border:1px solid #1f2937}
.oracle-bars{display:grid;grid-template-columns:1fr auto 1fr;gap:.3rem;align-items:center;margin:.4rem 0}
.bar-dom{height:6px;background:#3b82f6;border-radius:3px}
.bar-ext{height:6px;background:#ef4444;border-radius:3px}
.bar-nul{font-size:.6rem;color:#6b7280;font-family:monospace;text-align:center}
.signal{display:inline-block;font-size:.6rem;font-weight:900;padding:.2rem .6rem;border-radius:6px;margin-top:.4rem;letter-spacing:.1em}
.signal.FORT{background:#10b98120;color:#10b981}
.signal.MOYEN{background:#f59e0b20;color:#f59e0b}
.signal.RISQUÉ{background:#ef444420;color:#ef4444}
.forme{display:flex;gap:.2rem;margin:.3rem 0}
.f{width:18px;height:18px;border-radius:4px;font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.f.V{background:#10b98130;color:#10b981}
.f.N{background:#f59e0b30;color:#f59e0b}
.f.D{background:#ef444430;color:#ef4444}
.analyse{font-size:.72rem;color:#d1d5db;line-height:1.6;margin-top:.5rem;padding:.5rem;background:#060709;border-radius:8px;border-left:3px solid #f59e0b}
.news-item{font-size:.7rem;color:#9ca3af;line-height:1.5;margin-top:.5rem;padding-top:.5rem;border-top:1px solid #1f2937}
.news-title{font-size:.78rem;font-weight:700;color:#f3f4f6;margin-bottom:.2rem}
.news-source{font-size:.6rem;color:#f59e0b;font-family:monospace}
.hs-card{background:#0e111a;border-radius:12px;padding:1rem;margin-bottom:.8rem;border:1px solid #f59e0b30}
.hs-title{font-size:.8rem;font-weight:900;color:#f59e0b;font-family:monospace;margin-bottom:.6rem}
.hs-item{font-size:.75rem;color:#d1d5db;padding:.3rem 0;border-bottom:1px solid #1f2937;line-height:1.5}
.hs-item:last-child{border:none}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.72rem;font-family:monospace}
th{color:#6b7280;padding:.4rem .3rem;text-align:left;font-weight:700;border-bottom:1px solid #1f2937}
td{padding:.4rem .3rem;border-bottom:1px solid #0e111a10;color:#d1d5db}
tr:first-child td{color:#f59e0b;font-weight:700}
.groupe-sep{font-size:.6rem;color:#f59e0b;font-family:monospace;font-weight:700;padding:.4rem 0 .2rem;border-top:1px solid #1f2937;margin-top:.3rem}
.scorer{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #1f2937}
.scorer:last-child{border:none}
.scorer-name{font-size:.8rem;font-weight:700}
.scorer-club{font-size:.6rem;color:#6b7280}
.scorer-buts{font-family:monospace;font-weight:900;color:#f59e0b;font-size:1rem}
.cal-card{background:#0e111a;border-radius:10px;padding:.7rem 1rem;margin-bottom:.5rem;border:1px solid #1f2937;display:flex;justify-content:space-between;align-items:center}
.cal-teams{font-size:.85rem;font-weight:700}
.cal-info{font-size:.6rem;color:#6b7280;font-family:monospace;margin-top:.2rem}
.cal-groupe{font-size:.6rem;color:#f59e0b;font-family:monospace}
.ligue-label{font-size:.7rem;font-weight:900;color:#f59e0b;font-family:monospace;margin:.8rem 0 .4rem;display:flex;align-items:center;gap:.5rem}
.live-dot{width:6px;height:6px;background:#ef4444;border-radius:50%;display:inline-block;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.empty{text-align:center;padding:3rem 1rem;color:#374151;font-family:monospace;font-size:.8rem}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>VATICIN</h1>
      <p class="sub">MAX DATA • MAX ORACLE • MUJOS 🐙</p>
    </div>
    <select id="lang" onchange="changeLang(this.value)">
      <option value="fr">🇫🇷 FR</option>
      <option value="en">🇬🇧 EN</option>
      <option value="pt">🇵🇹 PT</option>
      <option value="es">🇪🇸 ES</option>
      <option value="ar">🇦🇪 AR</option>
      <option value="sw">🇹🇿 SW</option>
    </select>
  </div>
  <p class="update" id="update-time">⏳ Chargement...</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="setTab('flash',this)">⚡ FLASH</button>
  <button class="tab" onclick="setTab('oracle',this)">🔮 ORACLE</button>
  <button class="tab" onclick="setTab('stats',this)">📊 STATS</button>
  <button class="tab" onclick="setTab('buteurs',this)">⚽ BUTEURS</button>
  <button class="tab" onclick="setTab('news',this)">📰 NEWS</button>
  <button class="tab" onclick="setTab('calendrier',this)">🗓️ CALENDRIER</button>
</div>

<div class="ligues-bar" id="ligues-bar"></div>

<main id="main-content">
  <div class="empty">⏳ Chargement des données...</div>
</main>

<script>
let DATA = null;
let currentTab = 'flash';
let currentLigue = 'ALL';
let currentLang = 'fr';

const LANG = {
  fr:{flash:"⚡ Flash",oracle:"🔮 Oracle",stats:"📊 Stats",buteurs:"⚽ Buteurs",news:"📰 News",calendrier:"🗓️ Calendrier",dom:"Domicile",ext:"Extérieur",nul:"Nul",signal:"Signal",pts:"Pts",j:"J",g:"G",n:"N",p:"P",bp:"BP",bc:"BC",all:"Toutes",buts:"buts",horsSaison:"Hors saison · Mercato"},
  en:{flash:"⚡ Flash",oracle:"🔮 Oracle",stats:"📊 Stats",buteurs:"⚽ Scorers",news:"📰 News",calendrier:"🗓️ Schedule",dom:"Home",ext:"Away",nul:"Draw",signal:"Signal",pts:"Pts",j:"P",g:"W",n:"D",p:"L",bp:"GF",bc:"GA",all:"All",buts:"goals",horsSaison:"Off season · Transfer"},
  pt:{flash:"⚡ Flash",oracle:"🔮 Oráculo",stats:"📊 Stats",buteurs:"⚽ Artilheiros",news:"📰 Notícias",calendrier:"🗓️ Calendário",dom:"Casa",ext:"Fora",nul:"Empate",signal:"Sinal",pts:"Pts",j:"J",g:"V",n:"E",p:"D",bp:"GM",bc:"GS",all:"Todas",buts:"golos",horsSaison:"Fora época · Mercado"},
  es:{flash:"⚡ Flash",oracle:"🔮 Oráculo",stats:"📊 Stats",buteurs:"⚽ Goleadores",news:"📰 Noticias",calendrier:"🗓️ Calendario",dom:"Local",ext:"Visitante",nul:"Empate",signal:"Señal",pts:"Pts",j:"J",g:"G",n:"E",p:"P",bp:"GF",bc:"GC",all:"Todas",buts:"goles",horsSaison:"Fuera temporada · Mercado"},
  ar:{flash:"⚡ عاجل",oracle:"🔮 أوراكل",stats:"📊 إحصائيات",buteurs:"⚽ هدافون",news:"📰 أخبار",calendrier:"🗓️ جدول",dom:"المضيف",ext:"الضيف",nul:"تعادل",signal:"إشارة",pts:"ن",j:"ل",g:"ف",n:"ت",p:"خ",bp:"له",bc:"عليه",all:"الكل",buts:"أهداف",horsSaison:"خارج الموسم"},
  sw:{flash:"⚡ Haraka",oracle:"🔮 Oracle",stats:"📊 Takwimu",buteurs:"⚽ Wachezaji",news:"📰 Habari",calendrier:"🗓️ Ratiba",dom:"Nyumbani",ext:"Mgeni",nul:"Sare",signal:"Ishara",pts:"Pts",j:"M",g:"S",n:"F",p:"K",bp:"MB",bc:"ME",all:"Zote",buts:"magoli",horsSaison:"Nje ya msimu · Soko"}
};

const STATUTS = {
  LIVE:{fr:"🔴 LIVE",en:"🔴 LIVE",pt:"🔴 AO VIVO",es:"🔴 EN VIVO",ar:"🔴 مباشر",sw:"🔴 MOJA KWA MOJA"},
  IN_PLAY:{fr:"🔴 EN COURS",en:"🔴 IN PLAY",pt:"🔴 EM JOGO",es:"🔴 EN JUEGO",ar:"🔴 جاري",sw:"🔴 INAENDELEA"},
  TIMED:{fr:"⏰ PRÉVU",en:"⏰ UPCOMING",pt:"⏰ PREVISTO",es:"⏰ PREVISTO",ar:"⏰ مجدول",sw:"⏰ IMEPANGWA"},
  SCHEDULED:{fr:"📅 PRÉVU",en:"📅 SCHEDULED",pt:"📅 AGENDADO",es:"📅 PROGRAMADO",ar:"📅 مجدول",sw:"📅 IMEPANGWA"},
  FINISHED:{fr:"✅ TERMINÉ",en:"✅ FINISHED",pt:"✅ CONCLUÍDO",es:"✅ FINALIZADO",ar:"✅ انتهى",sw:"✅ IMEKWISHA"},
  MERCATO:{fr:"🔄 MERCATO",en:"🔄 TRANSFER",pt:"🔄 MERCADO",es:"🔄 MERCADO",ar:"🔄 انتقالات",sw:"🔄 SOKO"}
};

function t(key){return LANG[currentLang]?.[key]||LANG.fr[key]||key}

function formatDate(str){
  if(!str||str.includes("préparation"))return str||"";
  try{
    const d=new Date(str);
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})+' '+
           d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){return str;}
}

function statutClass(s){
  if(['LIVE','IN_PLAY'].includes(s))return 'live';
  if(['TIMED','SCHEDULED'].includes(s))return 'scheduled';
  if(s==='FINISHED')return 'finished';
  return 'mercato';
}

async function loadData(){
  try{
    const r=await fetch('ligues.json?t='+Date.now());
    DATA=await r.json();
    document.getElementById('update-time').innerText=
      '🕐 Mis à jour : '+(DATA.mise_a_jour?new Date(DATA.mise_a_jour).toLocaleString('fr-FR'):'inconnu');
    buildLiguesBar();
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML=
      '<div class="empty">❌ Erreur de chargement. Réessaie.</div>';
  }
}

function buildLiguesBar(){
  if(!DATA)return;
  const bar=document.getElementById('ligues-bar');
  let html=`<button class="lbtn active" onclick="setLigue('ALL',this)">${t('all')}</button>`;
  (DATA.ligues||[]).forEach(l=>{
    html+=`<button class="lbtn" onclick="setLigue('${l.code}',this)">${l.nom}</button>`;
  });
  bar.innerHTML=html;
}

function setTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function setLigue(code,btn){
  currentLigue=code;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function changeLang(lang){
  currentLang=lang;
  document.documentElement.lang=lang;
  document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  buildLiguesBar();
  render();
}

function getLigues(){
  if(!DATA)return[];
  if(currentLigue==='ALL')return DATA.ligues||[];
  return(DATA.ligues||[]).filter(l=>l.code===currentLigue);
}

function renderFormeHTML(m){
  const fd=m.stats_dom?.forme||m.forme_dom||'';
  const fe=m.stats_ext?.forme||m.forme_ext||'';
  if(!fd&&!fe)return'';
  if(fd==='?????'&&fe==='?????')return'';
  return`
    <div style="display:flex;justify-content:space-between;margin:.3rem 0">
      <div>
        <div style="font-size:.55rem;color:#6b7280;margin-bottom:.2rem">${m.domicile}</div>
        <div class="forme">${fd.split('').map(f=>`<div class="f ${f}">${f}</div>`).join('')}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:.55rem;color:#6b7280;margin-bottom:.2rem">${m.exterieur}</div>
        <div class="forme" style="justify-content:flex-end">${fe.split('').map(f=>`<div class="f ${f}">${f}</div>`).join('')}</div>
      </div>
    </div>`;
}

function renderMatchCard(m,showAnalyse=false){
  const oracle=m.oracle||{};
  const statut=STATUTS[m.statut]?.[currentLang]||m.statut||'';
  const sClass=statutClass(m.statut);
  const isLive=['LIVE','IN_PLAY'].includes(m.statut);

  let oracleHTML='';
  if(oracle.proba_dom){
    oracleHTML=`
      <div class="oracle">
        <div class="oracle-bars">
          <div>
            <div style="font-size:.6rem;color:#3b82f6;margin-bottom:.2rem">${t('dom')} ${oracle.proba_dom}%</div>
            <div class="bar-dom" style="width:${oracle.proba_dom}%"></div>
          </div>
          <div class="bar-nul">${t('nul')}<br>${oracle.proba_nul}%</div>
          <div>
            <div style="font-size:.6rem;color:#ef4444;margin-bottom:.2rem;text-align:right">${t('ext')} ${oracle.proba_ext}%</div>
            <div class="bar-ext" style="width:${oracle.proba_ext}%;margin-left:auto"></div>
          </div>
        </div>
        <span class="signal ${oracle.signal}">${t('signal')} : ${oracle.signal}</span>
      </div>`;
  }

  const analyseHTML=showAnalyse&&m.analyse?
    `<div class="analyse">${m.analyse}</div>`:'';

  return`
    <div class="card">
      <div class="card-header">
        <div>
          <div class="teams">
            ${isLive?'<span class="live-dot"></span> ':''}
            ${m.domicile} <span style="color:#6b7280;font-size:.8rem">vs</span> ${m.exterieur}
          </div>
          <div class="time">${formatDate(m.heure)}${m.meteo?' · '+m.meteo:''}</div>
          ${m.groupe?`<div style="font-size:.6rem;color:#f59e0b;font-family:monospace">Gr. ${m.groupe}</div>`:''}
        </div>
        <div style="text-align:right">
          <div class="score">${m.score||'VS'}</div>
          <span class="statut ${sClass}">${statut}</span>
        </div>
      </div>
      ${renderFormeHTML(m)}
      ${oracleHTML}
      ${analyseHTML}
    </div>`;
}

function renderHorsSaison(l){
  if(!l.hors_saison)return'';
  const infos=l.infos_hors_saison||[];
  if(!infos.length)return'';
  return`
    <div class="hs-card">
      <div class="hs-title">${l.nom} · ${t('horsSaison')}</div>
      ${infos.map(i=>`<div class="hs-item">${i}</div>`).join('')}
    </div>`;
}

function renderFlash(){
  const ligues=getLigues();
  let html='';
  ligues.forEach(l=>{
    if(l.hors_saison){html+=renderHorsSaison(l);return;}
    const live=l.matchs.filter(m=>['LIVE','IN_PLAY'].includes(m.statut));
    const autres=l.matchs.filter(m=>!['LIVE','IN_PLAY'].includes(m.statut));
    const matchs=[...live,...autres];
    if(!matchs.length)return;
    html+=`<div class="ligue-label">${l.nom}${l.meteo?` <span style="font-weight:400;color:#6b7280">${l.meteo}</span>`:''}</div>`;
    matchs.forEach(m=>{html+=renderMatchCard(m,false);});
  });
  return html||'<div class="empty">Aucun match disponible</div>';
}

function renderOracle(){
  const ligues=getLigues();
  let html='';
  ligues.forEach(l=>{
    if(l.hors_saison)return;
    const matchs=l.matchs.filter(m=>m.oracle&&m.oracle.proba_dom&&['TIMED','SCHEDULED','LIVE','IN_PLAY'].includes(m.statut));
    if(!matchs.length)return;
    html+=`<div class="ligue-label">${l.nom}</div>`;
    const sorted=[...matchs].sort((a,b)=>
      Math.abs(b.oracle.proba_dom-b.oracle.proba_ext)-Math.abs(a.oracle.proba_dom-a.oracle.proba_ext)
    );
    sorted.forEach(m=>{html+=renderMatchCard(m,true);});
  });
  return html||'<div class="empty">Aucune prédiction disponible</div>';
}

function renderStats(){
  const ligues=getLigues();
  let html='';
  ligues.forEach(l=>{
    if(l.hors_saison){html+=renderHorsSaison(l);}
    if(!l.classement?.length)return;
    const groupes={};
    l.classement.forEach(row=>{
      const g=row.groupe||'__';
      if(!groupes[g])groupes[g]=[];
      groupes[g].push(row);
    });
    html+=`<div class="card">
      <div style="font-size:.75rem;font-weight:900;color:#f59e0b;font-family:monospace;margin-bottom:.6rem">${l.nom}</div>
      <div class="table-wrap">`;
    Object.entries(groupes).forEach(([g,rows])=>{
      if(g!=='__')html+=`<div class="groupe-sep">Groupe ${g}</div>`;
      html+=`<table>
        <tr><th>#</th><th>Équipe</th><th>${t('pts')}</th><th>${t('j')}</th><th>${t('g')}</th><th>${t('n')}</th><th>${t('p')}</th><th>${t('bp')}</th><th>${t('bc')}</th></tr>
        ${rows.map(row=>`<tr>
          <td>${row.pos}</td><td>${row.equipe}</td>
          <td><b>${row.pts}</b></td><td>${row.j}</td>
          <td>${row.g}</td><td>${row.n}</td><td>${row.p}</td>
          <td>${row.bp}</td><td>${row.bc}</td>
        </tr>`).join('')}
      </table>`;
    });
    html+=`</div></div>`;
  });
  return html||'<div class="empty">Aucun classement disponible</div>';
}

function renderButeurs(){
  const ligues=getLigues();
  let html='';
  ligues.forEach(l=>{
    if(!l.buteurs?.length)return;
    html+=`<div class="card">
      <div style="font-size:.75rem;font-weight:900;color:#f59e0b;font-family:monospace;margin-bottom:.6rem">${l.nom}</div>
      ${l.buteurs.map((s,i)=>`
        <div class="scorer">
          <div>
            <div class="scorer-name">${i+1}. ${s.joueur}</div>
            <div class="scorer-club">${s.equipe}</div>
          </div>
          <div class="scorer-buts">${s.buts} <span style="font-size:.6rem;color:#6b7280">${t('buts')}</span></div>
        </div>`).join('')}
    </div>`;
  });
  return html||'<div class="empty">Aucun buteur disponible</div>';
}

function renderNews(){
  const ligues=getLigues();
  let html='';
  // News globales du bot
  if(DATA.news?.length){
    html+=`<div class="ligue-label">📰 Actualités Football</div>`;
    DATA.news.forEach(n=>{
      html+=`<div class="card">
        <div class="news-title">${n.titre||n.title||''}</div>
        <div class="news-item">${n.description||n.texte||''}</div>
        <div class="news-source">${n.source||''} · ${n.date?new Date(n.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):''}</div>
      </div>`;
    });
  }
  // News par match
  ligues.forEach(l=>{
    if(l.hors_saison&&l.infos_hors_saison?.length){
      html+=renderHorsSaison(l);return;
    }
    const avecNews=l.matchs.filter(m=>m.news&&m.news.length>10);
    if(!avecNews.length)return;
    html+=`<div class="ligue-label">${l.nom}</div>`;
    avecNews.forEach(m=>{
      html+=`<div class="card">
        <div style="font-size:.8rem;font-weight:700;margin-bottom:.4rem">${m.domicile} vs ${m.exterieur}</div>
        <div class="news-item">${m.news}</div>
      </div>`;
    });
  });
  return html||'<div class="empty">Aucune actualité disponible</div>';
}

function renderCalendrier(){
  const ligues=getLigues();
  let html='';
  ligues.forEach(l=>{
    if(l.hors_saison){html+=renderHorsSaison(l);return;}
    const avenir=l.matchs.filter(m=>['TIMED','SCHEDULED'].includes(m.statut));
    if(!avenir.length)return;
    html+=`<div class="ligue-label">${l.nom}${l.meteo?` <span style="font-weight:400;color:#6b7280">${l.meteo}</span>`:''}</div>`;
    avenir.forEach(m=>{
      html+=`<div class="cal-card">
        <div>
          <div class="cal-teams">${m.domicile} vs ${m.exterieur}</div>
          <div class="cal-info">${formatDate(m.heure)}</div>
          ${m.groupe?`<div class="cal-groupe">Groupe ${m.groupe}</div>`:''}
        </div>
        <span class="statut scheduled">📅</span>
      </div>`;
    });
  });
  return html||'<div class="empty">Aucun match à venir</div>';
}

function render(){
  const c=document.getElementById('main-content');
  switch(currentTab){
    case 'flash':c.innerHTML=renderFlash();break;
    case 'oracle':c.innerHTML=renderOracle();break;
    case 'stats':c.innerHTML=renderStats();break;
    case 'buteurs':c.innerHTML=renderButeurs();break;
    case 'news':c.innerHTML=renderNews();break;
    case 'calendrier':c.innerHTML=renderCalendrier();break;
  }
}

loadData();
</script>
</body>

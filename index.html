<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VATICIN - Signaux Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="theme-color" content="#060709">
    <style>
        body { background-color: #060709; color: #f3f4f6; }
        .signal-card { background: #0e111a; border-left: 4px solid; }
        .border-wc { border-color: #f59e0b; }
        .border-pl { border-color: #3b82f6; }
        .border-sa { border-color: #10b981; }
        .border-ll { border-color: #ef4444; }
        .border-l1 { border-color: #8b5cf6; }
        .border-cl { border-color: #06b6d4; }
        .border-mercato { border-color: #f97316; }
    </style>
</head>
<body class="font-sans antialiased max-w-md mx-auto px-4 pb-12 select-none">

    <header class="py-5 flex justify-between items-center border-b border-gray-900 sticky top-0 bg-[#060709]/95 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-black tracking-widest text-amber-500 font-mono">VATICIN</h1>
            <p id="sub-header" class="text-[9px] text-gray-500 uppercase font-mono tracking-wider">Instantané • Zéro Blabla</p>
        </div>
        <select id="lang-select" onchange="changeLang(this.value)" class="bg-[#0e111a] text-xs font-mono text-gray-400 border border-gray-800 rounded px-1.5 py-0.5 outline-none">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="pt">PT</option>
            <option value="es">ES</option>
            <option value="ar">AR</option>
            <option value="sw">SW</option>
        </select>
    </header>

    <section class="mb-4 mt-4">
        <div id="flash-timeline" class="space-y-2"></div>
    </section>

    <section class="space-y-3">
        <div id="signals-container" class="space-y-3">
            <div class="animate-pulse space-y-2">
                <div class="h-24 bg-gray-900 rounded-xl"></div>
                <div class="h-24 bg-gray-900 rounded-xl"></div>
            </div>
        </div>
    </section>

    <script>
        let currentLang = 'fr';
        let globalData = [];

        const ligueColors = {
            "Coupe du Monde 2026": "border-wc",
            "Premier League": "border-pl",
            "Série A": "border-sa",
            "La Liga": "border-ll",
            "Ligue 1": "border-l1",
            "Ligue des Champions": "border-cl"
        };

        const ligueEmojis = {
            "Coupe du Monde 2026": "🌍",
            "Premier League": "🏴󠁧󠁢󠁥󠁮󠁧󠁿",
            "Série A": "🇮🇹",
            "La Liga": "🇪🇸",
            "Ligue 1": "🇫🇷",
            "Ligue des Champions": "⭐"
        };

        const statutLabels = {
            "LIVE": { fr:"🔴 EN DIRECT", en:"🔴 LIVE", pt:"🔴 AO VIVO", es:"🔴 EN VIVO", ar:"🔴 مباشر", sw:"🔴 MOJA KWA MOJA" },
            "IN_PLAY": { fr:"🔴 EN COURS", en:"🔴 IN PLAY", pt:"🔴 EM JOGO", es:"🔴 EN JUEGO", ar:"🔴 جاري", sw:"🔴 INAENDELEA" },
            "TIMED": { fr:"⏰ PRÉVU", en:"⏰ UPCOMING", pt:"⏰ PREVISTO", es:"⏰ PREVISTO", ar:"⏰ مجدول", sw:"⏰ IMEPANGWA" },
            "SCHEDULED": { fr:"📅 PROGRAMMÉ", en:"📅 SCHEDULED", pt:"📅 AGENDADO", es:"📅 PROGRAMADO", ar:"📅 مجدول", sw:"📅 IMEPANGWA" },
            "MERCATO": { fr:"🔄 MERCATO", en:"🔄 TRANSFER", pt:"🔄 MERCADO", es:"🔄 MERCADO", ar:"🔄 انتقالات", sw:"🔄 SOKO" }
        };

        const uiTexts = {
            fr: { sub: "Instantané • Zéro Blabla", vs: "contre", signal: "Signal", news: "Infos" },
            en: { sub: "Instant • No Blabla", vs: "vs", signal: "Signal", news: "News" },
            pt: { sub: "Instantâneo • Sem Blabla", vs: "contra", signal: "Sinal", news: "Notícias" },
            es: { sub: "Instantáneo • Sin Blabla", vs: "contra", signal: "Señal", news: "Noticias" },
            ar: { sub: "فوري • بدون كلام", vs: "ضد", signal: "إشارة", news: "أخبار" },
            sw: { sub: "Papo Hapo • Bila Blabla", vs: "dhidi ya", signal: "Ishara", news: "Habari" }
        };

        function formatHeure(heure) {
            if (!heure || heure.includes("préparation")) return heure;
            try {
                const d = new Date(heure);
                return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short'}) + 
                       ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            } catch(e) { return heure; }
        }

        async function init() {
            try {
                const r = await fetch('ligues.json?t=' + Date.now());
                globalData = await r.json();
                renderApp();
            } catch(e) {
                document.getElementById('signals-container').innerHTML =
                    `<p class="text-xs text-gray-500 text-center py-8 font-mono">🔮 En attente du premier lancement du robot...</p>`;
            }
        }

        function changeLang(v) {
            currentLang = v;
            if (currentLang === 'ar') document.body.style.direction = 'rtl';
            else document.body.style.direction = 'ltr';
            renderApp();
        }

        function renderApp() {
            const ui = uiTexts[currentLang] || uiTexts['fr'];
            document.getElementById('sub-header').innerText = ui.sub;

            const timeline = document.getElementById('flash-timeline');
            const container = document.getElementById('signals-container');

            // Flash timeline — premier signal
            const premier = globalData[0]?.matchs[0];
            if (premier) {
                timeline.innerHTML = `
                    <div class="p-2 bg-amber-950/20 text-amber-400 text-xs rounded border border-amber-900/40 font-mono truncate">
                        ⚡ ${premier.signal_vatican?.substring(0, 80)}...
                    </div>`;
            }

            // Rendu des ligues et matchs
            container.innerHTML = globalData.map(ligue => {
                const color = ligueColors[ligue.ligue] || 'border-wc';
                const emoji = ligueEmojis[ligue.ligue] || '⚽';

                const matchsHTML = ligue.matchs.map(m => {
                    const statut = statutLabels[m.statut]?.[currentLang] || m.statut;
                    const isMercato = m.statut === 'MERCATO';
                    const isLive = ['LIVE','IN_PLAY'].includes(m.statut);

                    return `
                        <div class="signal-card ${color} p-3 rounded-r-xl shadow-lg mb-2">
                            <div class="flex justify-between items-center mb-1">
                                <div class="font-bold text-sm text-gray-200">
                                    ${isMercato ? '🔄 Mercato' : `${m.domicile} <span class="text-gray-500 text-xs">${ui.vs}</span> ${m.exterieur}`}
                                </div>
                                <span class="font-mono text-[10px] text-gray-500">${formatHeure(m.heure)}</span>
                            </div>
                            <div class="flex items-center gap-2 my-1">
                                <span class="text-[9px] font-mono font-black px-1.5 py-0.5 rounded ${isLive ? 'bg-red-500/10 text-red-400' : 'bg-amber-500/10 text-amber-400'} tracking-wider">
                                    ${statut}
                                </span>
                                ${m.score !== 'VS' && m.score !== '🔄' ? `<span class="font-mono text-amber-500 font-bold">${m.score}</span>` : ''}
                            </div>
                            <p class="text-[11px] text-gray-400 italic mt-1.5 leading-relaxed">
                                💡 ${m.signal_vatican?.substring(0, 120)}...
                            </p>
                        </div>`;
                }).join('');

                return `
                    <div class="mb-4">
                        <div class="text-xs font-black font-mono text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-1">
                            ${emoji} ${ligue.ligue}
                        </div>
                        ${matchsHTML}
                    </div>`;
            }).join('');
        }

        document.addEventListener("DOMContentLoaded", init);
    </script>
</body>
    </html>
